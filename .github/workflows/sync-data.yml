name: Data Sync Hourly Predictions to Repo
run-name: Syncing hourly predictions for ${{ github.ref_name }} by @${{ github.actor }} 
on:
  schedule:
    - cron: '45 * * * *' # Every hour at 45 minutes past the hour
  workflow_dispatch: 

permissions:
  contents: write # REQUIRED to commit and push files
  id-token: write # REQUIRED for Workload Identity Federation (WIF)

# Inherit variables from your existing setup
env:
  PROJECT_ID: ${{ vars.PROJECT_ID }}
  BUCKET_NAME: ${{ vars.BUCKET_NAME }}
  WORKLOAD_IDENTITY_PROVIDER: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
  DEPLOYER_SA: ${{ vars.DEPLOYER_SA }}
  GCS_PREDS_PREFIX: "structured/preds_llm" # Base path for your prediction folders
  OUTPUT_DIR: "results" # Local folder to store all timestamped files

jobs:
  sync_data:
    runs-on: ubuntu-latest
    steps:
      # --- 1. SETUP & AUTHENTICATION ---
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # FIX: Explicitly grant the GITHUB_TOKEN write access for push/rebase
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auth (WIF) and Setup gcloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}
      
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # --- 2. DOWNLOAD AND RENAME DATA ---
      - name: Find Latest Run ID and sync all Artifacts
        id: sync_artifacts
        shell: bash
        run: |
          set -euo pipefail
          
          # 2a. Find the LATEST folder/run_id in GCS
          LATEST_RUN_DIR=$(gsutil ls -d gs://${BUCKET_NAME}/${GCS_PREDS_PREFIX}/*/ | tail -1)
          
          LATEST_RUN_ID=$(echo "$LATEST_RUN_DIR" | sed -E "s|gs://${BUCKET_NAME}/${GCS_PREDS_PREFIX}/||; s|/||")
          echo "run_id=$LATEST_RUN_ID" >> "$GITHUB_OUTPUT"

          mkdir -p ${{ env.OUTPUT_DIR }} 
          mkdir -p tmp_download
          gsutil -m cp gs://${BUCKET_NAME}/${GCS_PREDS_PREFIX}/$LATEST_RUN_ID/* tmp_download/

          # Rename in TEMP and move to RESULTS
          for file in tmp_download/*; do
            filename=$(basename "$file")
            # Only move and rename if the file doesn't already exist in results
            if [ ! -f "${{ env.OUTPUT_DIR }}/$LATEST_RUN_ID-$filename" ]; then
              mv "$file" "${{ env.OUTPUT_DIR }}/$LATEST_RUN_ID-$filename"
              echo "Added: $LATEST_RUN_ID-$filename"
            fi
          done
          rm -rf tmp_download

      # --- 3. COMMIT AND PUSH ---
      - name: Commit and Push New Timestamped File
        if: success() 
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          RUN_ID="${{ steps.sync_artifacts.outputs.run_id }}"
          git add ${{ env.OUTPUT_DIR }}/*

          if ! git diff --cached --quiet; then
            git commit -m "🤖 Data Sync: Add artifacts for run ${{ steps.sync_artifacts.outputs.run_id }}"
            
            # Use the "Force Pull" strategy to handle race conditions
            git pull --rebase origin main
            git push
          else
            echo "No new data to sync."
          fi